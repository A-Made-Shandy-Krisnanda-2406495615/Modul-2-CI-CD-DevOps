<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h3>Order History</h3>

    <form th:action="@{/order/history}" method="post">
        <div class="form-group">
            <label for="authorInput">Author</label>
            <input id="authorInput" name="author" type="text" class="form-control mb-4 col-6" placeholder="Enter author name">
        </div>
        <button type="submit" class="btn btn-primary mb-3">Search</button>
    </form>

    <table th:if="${orders != null}" border="1" class="table table-striped table-responsive-md">
        <thead>
        <tr>
            <th scope="col">Order ID</th>
            <th scope="col">Author</th>
            <th scope="col">Order Time</th>
            <th scope="col">Status</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${order.author}"></td>
            <td th:text="${order.orderTime}"></td>
            <td th:text="${order.status}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
