<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h3>Payment Admin Detail</h3>

    <p>Payment ID: <span id="paymentIdValue" th:text="${payment.id}"></span></p>
    <p>Payment Status: <span id="paymentStatusValue" th:text="${payment.status}"></span></p>
    <p>Order Status: <span id="orderStatusValue" th:text="${payment.order.status}"></span></p>

    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
        <input type="hidden" name="status" value="SUCCESS">
        <button id="acceptButton" type="submit" class="btn btn-success btn-sm">Accept</button>
    </form>
    <br>
    <form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
        <input type="hidden" name="status" value="REJECTED">
        <button id="rejectButton" type="submit" class="btn btn-danger btn-sm">Reject</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
