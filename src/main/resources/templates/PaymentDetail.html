<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Detail</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
</head>
<body>
<div class="container my-4">
    <h3>Payment Detail</h3>

    <form th:action="@{/payment/detail}" method="get">
        <div class="form-group">
            <label for="paymentIdInput">Payment ID</label>
            <input id="paymentIdInput" type="text" class="form-control mb-3 col-6" placeholder="Enter payment ID">
        </div>
    </form>

    <div th:if="${payment != null}">
        <p>Payment ID: <span id="paymentIdValue" th:text="${payment.id}"></span></p>
        <p>Status: <span id="paymentStatusValue" th:text="${payment.status}"></span></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
